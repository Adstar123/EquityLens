name: Yahoo Debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Build and run Yahoo debug
        working-directory: backend
        run: |
          go build -o yahoodebug ./cmd/yahoodebug/
          ./yahoodebug
