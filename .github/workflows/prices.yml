name: Update Prices

on:
  schedule:
    # Run every hour during ASX trading hours (10am-4pm AEST = 0am-6am UTC)
    # Every hour from 00:00-06:00 UTC on weekdays
    - cron: '0 0-6 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  prices:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Build pricer
        working-directory: backend
        run: go build -o pricer ./cmd/pricer/

      - name: Run pricer
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MIGRATIONS_PATH: migrations
        run: ./pricer
