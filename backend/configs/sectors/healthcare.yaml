# Healthcare sector configuration (pharma, biotech, medical)
sector: healthcare
display_name: "Healthcare"
ratios:
  - key: pe_ratio
    name: "P/E Ratio"
    weight: 0.15
    lower_is_better: true
    ranges:
      strong: { max: 20 }
      good: { min: 20, max: 30 }
      neutral: { min: 30, max: 45 }
      weak: { min: 45, max: 60 }
      poor: { min: 60 }
  - key: debt_to_equity
    name: "Debt to Equity"
    weight: 0.20
    lower_is_better: true
    ranges:
      strong: { max: 0.3 }
      good: { min: 0.3, max: 0.6 }
      neutral: { min: 0.6, max: 1.0 }
      weak: { min: 1.0, max: 1.5 }
      poor: { min: 1.5 }
  - key: fcf_yield
    name: "Free Cash Flow Yield"
    weight: 0.25
    lower_is_better: false
    ranges:
      strong: { min: 5 }
      good: { min: 3, max: 5 }
      neutral: { min: 1.5, max: 3 }
      weak: { min: 0.5, max: 1.5 }
      poor: { max: 0.5 }
  - key: roe
    name: "Return on Equity"
    weight: 0.25
    lower_is_better: false
    ranges:
      strong: { min: 20 }
      good: { min: 14, max: 20 }
      neutral: { min: 8, max: 14 }
      weak: { min: 3, max: 8 }
      poor: { max: 3 }
  - key: ev_ebitda
    name: "EV/EBITDA"
    weight: 0.15
    lower_is_better: true
    ranges:
      strong: { max: 12 }
      good: { min: 12, max: 20 }
      neutral: { min: 20, max: 30 }
      weak: { min: 30, max: 45 }
      poor: { min: 45 }
edge_cases:
  negative_earnings: "exclude_pe_redistribute"
  missing_data_threshold: 0.4
rating_scale:
  strong_buy: { min: 80 }
  buy: { min: 65, max: 80 }
  hold: { min: 45, max: 65 }
  sell: { min: 30, max: 45 }
  strong_sell: { max: 30 }
