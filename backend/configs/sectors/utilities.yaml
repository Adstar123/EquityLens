# Utilities sector configuration (electricity, water, gas)
sector: utilities
display_name: "Utilities"
ratios:
  - key: pe_ratio
    name: "P/E Ratio"
    weight: 0.20
    lower_is_better: true
    ranges:
      strong: { max: 14 }
      good: { min: 14, max: 20 }
      neutral: { min: 20, max: 26 }
      weak: { min: 26, max: 34 }
      poor: { min: 34 }
  - key: debt_to_equity
    name: "Debt to Equity"
    weight: 0.20
    lower_is_better: true
    ranges:
      strong: { max: 0.8 }
      good: { min: 0.8, max: 1.2 }
      neutral: { min: 1.2, max: 1.8 }
      weak: { min: 1.8, max: 2.5 }
      poor: { min: 2.5 }
  - key: fcf_yield
    name: "Free Cash Flow Yield"
    weight: 0.20
    lower_is_better: false
    ranges:
      strong: { min: 6 }
      good: { min: 4, max: 6 }
      neutral: { min: 2.5, max: 4 }
      weak: { min: 1, max: 2.5 }
      poor: { max: 1 }
  - key: roe
    name: "Return on Equity"
    weight: 0.20
    lower_is_better: false
    ranges:
      strong: { min: 12 }
      good: { min: 9, max: 12 }
      neutral: { min: 6, max: 9 }
      weak: { min: 3, max: 6 }
      poor: { max: 3 }
  - key: ev_ebitda
    name: "EV/EBITDA"
    weight: 0.20
    lower_is_better: true
    ranges:
      strong: { max: 8 }
      good: { min: 8, max: 12 }
      neutral: { min: 12, max: 16 }
      weak: { min: 16, max: 22 }
      poor: { min: 22 }
edge_cases:
  negative_earnings: "exclude_pe_redistribute"
  missing_data_threshold: 0.4
rating_scale:
  strong_buy: { min: 80 }
  buy: { min: 65, max: 80 }
  hold: { min: 45, max: 65 }
  sell: { min: 30, max: 45 }
  strong_sell: { max: 30 }
