# Industrials sector configuration (manufacturing, construction, engineering)
sector: industrials
display_name: "Industrials"
ratios:
  - key: pe_ratio
    name: "P/E Ratio"
    weight: 0.20
    lower_is_better: true
    ranges:
      strong: { max: 12 }
      good: { min: 12, max: 18 }
      neutral: { min: 18, max: 25 }
      weak: { min: 25, max: 35 }
      poor: { min: 35 }
  - key: debt_to_equity
    name: "Debt to Equity"
    weight: 0.20
    lower_is_better: true
    ranges:
      strong: { max: 0.3 }
      good: { min: 0.3, max: 0.6 }
      neutral: { min: 0.6, max: 1.0 }
      weak: { min: 1.0, max: 1.5 }
      poor: { min: 1.5 }
  - key: fcf_yield
    name: "Free Cash Flow Yield"
    weight: 0.20
    lower_is_better: false
    ranges:
      strong: { min: 7 }
      good: { min: 5, max: 7 }
      neutral: { min: 3, max: 5 }
      weak: { min: 1, max: 3 }
      poor: { max: 1 }
  - key: roe
    name: "Return on Equity"
    weight: 0.25
    lower_is_better: false
    ranges:
      strong: { min: 18 }
      good: { min: 13, max: 18 }
      neutral: { min: 9, max: 13 }
      weak: { min: 5, max: 9 }
      poor: { max: 5 }
  - key: ev_ebitda
    name: "EV/EBITDA"
    weight: 0.15
    lower_is_better: true
    ranges:
      strong: { max: 7 }
      good: { min: 7, max: 11 }
      neutral: { min: 11, max: 15 }
      weak: { min: 15, max: 20 }
      poor: { min: 20 }
edge_cases:
  negative_earnings: "exclude_pe_redistribute"
  missing_data_threshold: 0.4
rating_scale:
  strong_buy: { min: 80 }
  buy: { min: 65, max: 80 }
  hold: { min: 45, max: 65 }
  sell: { min: 30, max: 45 }
  strong_sell: { max: 30 }
