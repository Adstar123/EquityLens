# Communication Services sector configuration (telecom, media)
sector: communication
display_name: "Communication Services"
ratios:
  - key: pe_ratio
    name: "P/E Ratio"
    weight: 0.20
    lower_is_better: true
    ranges:
      strong: { max: 14 }
      good: { min: 14, max: 20 }
      neutral: { min: 20, max: 28 }
      weak: { min: 28, max: 38 }
      poor: { min: 38 }
  - key: debt_to_equity
    name: "Debt to Equity"
    weight: 0.20
    lower_is_better: true
    ranges:
      strong: { max: 0.5 }
      good: { min: 0.5, max: 0.9 }
      neutral: { min: 0.9, max: 1.4 }
      weak: { min: 1.4, max: 2.0 }
      poor: { min: 2.0 }
  - key: fcf_yield
    name: "Free Cash Flow Yield"
    weight: 0.25
    lower_is_better: false
    ranges:
      strong: { min: 7 }
      good: { min: 5, max: 7 }
      neutral: { min: 3, max: 5 }
      weak: { min: 1.5, max: 3 }
      poor: { max: 1.5 }
  - key: roe
    name: "Return on Equity"
    weight: 0.20
    lower_is_better: false
    ranges:
      strong: { min: 16 }
      good: { min: 11, max: 16 }
      neutral: { min: 7, max: 11 }
      weak: { min: 3, max: 7 }
      poor: { max: 3 }
  - key: ev_ebitda
    name: "EV/EBITDA"
    weight: 0.15
    lower_is_better: true
    ranges:
      strong: { max: 7 }
      good: { min: 7, max: 11 }
      neutral: { min: 11, max: 15 }
      weak: { min: 15, max: 20 }
      poor: { min: 20 }
edge_cases:
  negative_earnings: "exclude_pe_redistribute"
  missing_data_threshold: 0.4
rating_scale:
  strong_buy: { min: 80 }
  buy: { min: 65, max: 80 }
  hold: { min: 45, max: 65 }
  sell: { min: 30, max: 45 }
  strong_sell: { max: 30 }
