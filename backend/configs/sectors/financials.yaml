# Financials sector configuration (banks, insurance, financial services)
sector: financials
display_name: "Financials"
ratios:
  - key: pe_ratio
    name: "P/E Ratio"
    weight: 0.20
    lower_is_better: true
    ranges:
      strong: { max: 10 }
      good: { min: 10, max: 14 }
      neutral: { min: 14, max: 18 }
      weak: { min: 18, max: 24 }
      poor: { min: 24 }
  - key: debt_to_equity
    name: "Debt to Equity"
    weight: 0.10
    lower_is_better: true
    ranges:
      strong: { max: 3.0 }
      good: { min: 3.0, max: 5.0 }
      neutral: { min: 5.0, max: 8.0 }
      weak: { min: 8.0, max: 12.0 }
      poor: { min: 12.0 }
  - key: fcf_yield
    name: "Free Cash Flow Yield"
    weight: 0.15
    lower_is_better: false
    ranges:
      strong: { min: 7 }
      good: { min: 5, max: 7 }
      neutral: { min: 3, max: 5 }
      weak: { min: 1, max: 3 }
      poor: { max: 1 }
  - key: roe
    name: "Return on Equity"
    weight: 0.35
    lower_is_better: false
    ranges:
      strong: { min: 15 }
      good: { min: 11, max: 15 }
      neutral: { min: 8, max: 11 }
      weak: { min: 4, max: 8 }
      poor: { max: 4 }
  - key: ev_ebitda
    name: "EV/EBITDA"
    weight: 0.20
    lower_is_better: true
    ranges:
      strong: { max: 8 }
      good: { min: 8, max: 12 }
      neutral: { min: 12, max: 16 }
      weak: { min: 16, max: 22 }
      poor: { min: 22 }
edge_cases:
  negative_earnings: "exclude_pe_redistribute"
  missing_data_threshold: 0.4
rating_scale:
  strong_buy: { min: 80 }
  buy: { min: 65, max: 80 }
  hold: { min: 45, max: 65 }
  sell: { min: 30, max: 45 }
  strong_sell: { max: 30 }
