# Consumer Staples sector configuration (food, retail essentials)
sector: consumer_staples
display_name: "Consumer Staples"
ratios:
  - key: net_profit_margin
    name: "Net Profit Margin"
    weight: 0.143
    lower_is_better: false
    ranges:
      strong:  { min: 20 }
      good:    { min: 10, max: 20 }
      neutral: { min: 5, max: 10 }
      weak:    { min: 0, max: 5 }
      poor:    { max: 0 }

  - key: roe
    name: "Return on Equity"
    weight: 0.143
    lower_is_better: false
    ranges:
      strong:  { min: 20 }
      good:    { min: 15, max: 20 }
      neutral: { min: 10, max: 15 }
      weak:    { min: 5, max: 10 }
      poor:    { max: 5 }

  - key: current_ratio
    name: "Current Ratio"
    weight: 0.143
    lower_is_better: false
    ranges:
      strong:  { min: 2.0 }
      good:    { min: 1.5, max: 2.0 }
      neutral: { min: 1.0, max: 1.5 }
      weak:    { min: 0.5, max: 1.0 }
      poor:    { max: 0.5 }

  - key: quick_ratio
    name: "Quick Ratio"
    weight: 0.143
    lower_is_better: false
    ranges:
      strong:  { min: 1.5 }
      good:    { min: 1.0, max: 1.5 }
      neutral: { min: 0.7, max: 1.0 }
      weak:    { min: 0.4, max: 0.7 }
      poor:    { max: 0.4 }

  - key: debt_to_equity
    name: "Debt to Equity"
    weight: 0.143
    lower_is_better: true
    ranges:
      strong:  { max: 0.3 }
      good:    { min: 0.3, max: 0.6 }
      neutral: { min: 0.6, max: 1.0 }
      weak:    { min: 1.0, max: 2.0 }
      poor:    { min: 2.0 }

  - key: interest_coverage
    name: "Interest Coverage"
    weight: 0.143
    lower_is_better: false
    max_clamp: 50
    ranges:
      strong:  { min: 8 }
      good:    { min: 4, max: 8 }
      neutral: { min: 2, max: 4 }
      weak:    { min: 1, max: 2 }
      poor:    { max: 1 }

  - key: asset_turnover
    name: "Asset Turnover"
    weight: 0.142
    lower_is_better: false
    max_clamp: 5
    ranges:
      strong:  { min: 1.5 }
      good:    { min: 1.0, max: 1.5 }
      neutral: { min: 0.5, max: 1.0 }
      weak:    { min: 0.2, max: 0.5 }
      poor:    { max: 0.2 }
edge_cases:
  missing_data_threshold: 0.4
rating_scale:
  strong_buy: { min: 80 }
  buy: { min: 65, max: 80 }
  hold: { min: 45, max: 65 }
  sell: { min: 30, max: 45 }
  strong_sell: { max: 30 }
